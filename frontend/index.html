<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sands Jewels</title>
  <!-- Preconnect to critical origins for faster DNS + TLS handshakes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  <!-- Google Fonts loaded as <link> (not CSS @import) so browser discovers them immediately -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700&family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- Razorpay loaded after app bundle — no longer blocks render -->
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</body>

</html>
